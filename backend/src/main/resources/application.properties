# ── Server ───────────────────────────────────────────
server.port=8080

# ── App ───────────────────────────────────────────────
app.name=DisasterTrain360 AI
app.version=1.0.0

# ── JWT ───────────────────────────────────────────────
app.jwt.secret=ZGlzYXN0ZXJ0cmFpbjM2MGFpc2VjcmV0a2V5Zm9yandiYWNrZW5kMjAyNnN0cm9uZ2tleQ==
app.jwt.expiration=86400000

# ── Your AWS Account — DynamoDB + SNS ────────────────
app.mock.enabled=false

cloud.aws.region.static=ap-south-1
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
app.aws.dynamodb.endpoint=
app.aws.s3.bucket=disastertrain360-files
app.aws.sns.topic.arn=arn:aws:sns:ap-south-1:221717898795:disastertrain360-alerts
app.aws.bedrock.model.id=amazon.titan-text-express-v1

aws.dynamodb.region=ap-south-1
aws.dynamodb.access-key=${AWS_ACCESS_KEY}
aws.dynamodb.secret-key=${AWS_SECRET_KEY}

# ── Bucket Owner's AWS Account — S3 only ─────────────
# Replace these with the credentials shared by the bucket owner
aws.s3.region=ap-south-1
aws.s3.access-key=${AWS_ACCESS_KEY}
aws.s3.secret-key=${AWS_SECRET_KEY}
app.aws.s3.bucket=disastertrain360-files


# ── DynamoDB Table Names ──────────────────────────────
app.dynamo.table.users=users
app.dynamo.table.trainings=trainings
app.dynamo.table.insights=insights
app.dynamo.table.reports=reports
app.dynamo.table.notifications=notifications
app.dynamo.table.enrollments=enrollments

# ── SNS ───────────────────────────────────────────────



# ── CORS ──────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,https://disastertrain360.vercel.app

# ── Swagger ───────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Logging ───────────────────────────────────────────
logging.level.com.disastertrain360=DEBUG
logging.level.org.springframework.security=WARN

# ── Multipart (Evidence Upload) ───────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB

# ---Lambda----
app.aws.lambda.function-name=disastertrain360-training-processor
